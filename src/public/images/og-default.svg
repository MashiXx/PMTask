<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  <!-- Icon -->
  <g transform="translate(500, 180)">
    <rect x="0" y="0" width="200" height="200" rx="40" fill="#e94560" opacity="0.15"/>
    <rect x="20" y="20" width="160" height="160" rx="30" fill="#e94560" opacity="0.3"/>
    <!-- Checkmark -->
    <polyline points="65,105 95,135 145,75" fill="none" stroke="#e94560" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700">PMTask</text>
  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" fill="#a0a0b0" font-family="system-ui, -apple-system, sans-serif" font-size="24">Project Management &amp; Task Tracking</text>
